<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Blocker Tests</title>
<style>
body { font-family: monospace; background: #0f172a; color: #e2e8f0; padding: 20px; }
#out { white-space: pre-wrap; line-height: 1.6; }
.pass { color: #4ade80; }
.fail { color: #f87171; font-weight: bold; }
</style>
</head><body>
<div id="out"></div>
<script src="bracket-algo.js"></script>
<script>
// Redirect console output to the page
(function() {
  var el = document.getElementById('out');
  var orig = { log: console.log.bind(console), error: console.error.bind(console) };
  console.log = function(s) { orig.log(s); el.innerHTML += '<span class="pass">' + s + '</span>\n'; };
  console.error = function(s) { orig.error(s); el.innerHTML += '<span class="fail">' + s + '</span>\n'; };
})();
</script>
<script src="test_blockers.js"></script>
</body></html>
